name: Update T2C GTFS Schedule

on:
  schedule:
    # Daily at 06:00 UTC (07:00 Paris time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: update-t2c-gtfs
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '24.15.0'

jobs:
  update-gtfs:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Download, validate and generate T2C GTFS
        id: sentinel_check
        run: |
          echo "🔍 Downloading, validating and generating official GTFS..."
          if npm run gtfs:update; then
            echo "is_updated=true" >> $GITHUB_OUTPUT
            echo "✅ Official data is valid and generation succeeded."
          else
            echo "is_updated=false" >> $GITHUB_OUTPUT
            echo "⚠️ Official data unavailable or generation failed. Skipping update."
          fi

      - name: Validate generated data
        if: steps.sentinel_check.outputs.is_updated == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const schedule = JSON.parse(fs.readFileSync('src/data/static_schedule.json', 'utf8'));
            const config = JSON.parse(fs.readFileSync('src/data/gtfs_config.json', 'utf8'));
            const stopTimes = JSON.parse(fs.readFileSync('public/data/e1_stop_times.json', 'utf8'));
            const lineE1 = JSON.parse(fs.readFileSync('public/data/lineE1_data.json', 'utf8'));

            if (schedule.length < 100) throw new Error('Too few scheduled stops: ' + schedule.length);
            if (!Array.isArray(config.routeIds) || config.routeIds.length === 0) throw new Error('Missing routeIds');
            if (!config.stopIds || !config.stopIds.champfleuri) throw new Error('Missing Champfleuri stop ids');
            if (!config.stopIds || !config.stopIds.patural) throw new Error('Missing Patural stop ids');
            if (!Array.isArray(stopTimes) || stopTimes.length === 0) throw new Error('Missing E1 stop times');
            if (!lineE1.stops || lineE1.stops.length < 50) throw new Error('Too few E1 map stops: ' + (lineE1.stops ? lineE1.stops.length : 0));
            if (!lineE1.shapes || !lineE1.shapes['0'] || !lineE1.shapes['1']) throw new Error('Missing E1 map shapes');
            console.log('✅ Generated data validation passed');
          "

      - name: Check for changes
        if: steps.sentinel_check.outputs.is_updated == 'true'
        id: check_changes
        run: |
          git add src/data/gtfs_config.json src/data/static_schedule.json public/data/e1_stop_times.json public/data/lineE1_data.json
          if git diff --cached --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes detected"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📝 Changes detected, will install dependencies, validate and commit"
          fi

      - name: Validate app
        if: steps.sentinel_check.outputs.is_updated == 'true' && steps.check_changes.outputs.changes == 'true'
        run: |
          npm run lint
          npm test -- --maxWorkers=50%
          npm run build

      - name: Commit and push changes
        if: steps.sentinel_check.outputs.is_updated == 'true' && steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "chore: update T2C GTFS data [$(date +'%Y-%m-%d')]"
          git push
