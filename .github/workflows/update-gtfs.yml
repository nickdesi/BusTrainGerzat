name: Update T2C GTFS Schedule

on:
  schedule:
    # Daily at 06:00 UTC (07:00 Paris time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: update-t2c-gtfs
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: '24.15.0'
  PYTHON_VERSION: '3.13'

jobs:
  update-gtfs:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check requests

      - name: Download and validate T2C GTFS
        id: sentinel_check
        run: |
          echo "🔍 Downloading and validating official GTFS..."
          if python scripts/gtfs/check_gtfs_update.py; then
            echo "is_updated=true" >> $GITHUB_OUTPUT
            echo "✅ Official data is valid. Proceeding with generation."
          else
            echo "is_updated=false" >> $GITHUB_OUTPUT
            echo "⚠️ Official data unavailable or invalid. Skipping update."
          fi

      - name: Generate static schedule
        if: steps.sentinel_check.outputs.is_updated == 'true'
        run: |
          python scripts/gtfs/generate_static_json.py
          python scripts/gtfs/generate_e1_stop_times.py

      - name: Validate generated data
        if: steps.sentinel_check.outputs.is_updated == 'true'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          schedule = json.loads(Path('src/data/static_schedule.json').read_text())
          config = json.loads(Path('src/data/gtfs_config.json').read_text())
          stop_times = json.loads(Path('public/data/e1_stop_times.json').read_text())

          if len(schedule) < 100:
              raise RuntimeError(f'Too few scheduled stops: {len(schedule)}')
          if not isinstance(config.get('routeIds'), list) or not config['routeIds']:
              raise RuntimeError('Missing routeIds')
          if not config.get('stopIds', {}).get('champfleuri'):
              raise RuntimeError('Missing Champfleuri stop ids')
          if not config.get('stopIds', {}).get('patural'):
              raise RuntimeError('Missing Patural stop ids')
          if not isinstance(stop_times, list) or not stop_times:
              raise RuntimeError('Missing E1 stop times')
          print('✅ Generated data validation passed')
          PY

      - name: Check for changes
        if: steps.sentinel_check.outputs.is_updated == 'true'
        id: check_changes
        run: |
          git add src/data/gtfs_config.json src/data/static_schedule.json public/data/e1_stop_times.json
          if git diff --cached --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes detected"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📝 Changes detected, will install dependencies, validate and commit"
          fi

      - name: Set up Node.js
        if: steps.sentinel_check.outputs.is_updated == 'true' && steps.check_changes.outputs.changes == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node dependencies
        if: steps.sentinel_check.outputs.is_updated == 'true' && steps.check_changes.outputs.changes == 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Validate app
        if: steps.sentinel_check.outputs.is_updated == 'true' && steps.check_changes.outputs.changes == 'true'
        run: |
          npm run lint
          npm test -- --maxWorkers=50%
          npm run build

      - name: Commit and push changes
        if: steps.sentinel_check.outputs.is_updated == 'true' && steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "chore: update T2C GTFS data [$(date +'%Y-%m-%d')]"
          git push

